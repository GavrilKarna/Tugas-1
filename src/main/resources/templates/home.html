<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-sky-100 to-cyan-200 min-h-screen flex flex-col overflow-x-hidden">

<!-- Background Glow Effect -->
<div class="absolute top-0 left-0 w-96 h-96 bg-blue-400 opacity-20 blur-3xl rounded-full -z-10"></div>
<div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-400 opacity-20 blur-3xl rounded-full -z-10"></div>

<!-- Navbar Fragment -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<!-- Main Content -->
<div class="flex-grow flex items-center justify-center px-6 py-16">

    <div class="bg-white/80 backdrop-blur-xl shadow-2xl rounded-3xl p-12 w-full max-w-6xl border border-white/40">

        <div class="grid md:grid-cols-2 gap-10 items-center">

            <!-- Left Content -->
            <div>
                <h1 class="text-5xl font-extrabold bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent mb-6"
                    th:text="${title}">
                    Title
                </h1>

                <p class="text-lg text-gray-700 leading-relaxed mb-8"
                   th:text="${description}">
                    Description
                </p>

                <a th:href="@{/products}"
                   class="inline-block bg-gradient-to-r from-blue-600 to-cyan-500 text-white px-8 py-3 rounded-2xl shadow-lg hover:scale-105 hover:shadow-xl transition duration-300">
                    Jelajahi Semua Produk →
                </a>
            </div>

            <!-- Right Content (Category Cards) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

                <a th:href="@{/products/category/Elektronik}"
                   class="group bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-2 transition duration-300 border border-blue-100">
                    <div class="text-3xl mb-3">💻</div>
                    <h3 class="text-xl font-semibold text-blue-600 group-hover:text-cyan-500 transition">
                        Elektronik
                    </h3>
                    <p class="text-sm text-gray-600 mt-2">
                        Temukan gadget dan perangkat terbaru.
                    </p>
                </a>

                <a th:href="@{/products/category/Buku}"
                   class="group bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-2 transition duration-300 border border-blue-100">
                    <div class="text-3xl mb-3">📚</div>
                    <h3 class="text-xl font-semibold text-blue-600 group-hover:text-cyan-500 transition">
                        Buku
                    </h3>
                    <p class="text-sm text-gray-600 mt-2">
                        Koleksi buku pengetahuan dan hiburan.
                    </p>
                </a>

                <a th:href="@{/products/category/Makanan}"
                   class="group bg-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-2 transition duration-300 border border-blue-100">
                    <div class="text-3xl mb-3">🍔</div>
                    <h3 class="text-xl font-semibold text-blue-600 group-hover:text-cyan-500 transition">
                        Makanan
                    </h3>
                    <p class="text-sm text-gray-600 mt-2">
                        Aneka makanan lezat dan favorit.
                    </p>
                </a>

                <a th:href="@{/products}"
                   class="group bg-gradient-to-r from-blue-600 to-cyan-500 text-white rounded-2xl p-6 shadow-md hover:shadow-xl hover:-translate-y-2 transition duration-300">
                    <div class="text-3xl mb-3">🛍️</div>
                    <h3 class="text-xl font-semibold">
                        Semua Produk
                    </h3>
                    <p class="text-sm mt-2 opacity-90">
                        Lihat seluruh koleksi tersedia.
                    </p>
                </a>

            </div>

        </div>

    </div>

</div>

<!-- Footer Fragment -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
