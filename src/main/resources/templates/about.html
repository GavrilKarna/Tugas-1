<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>About</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-sky-100 via-blue-100 to-cyan-100 min-h-screen flex items-center justify-center">

<div class="bg-white/70 backdrop-blur-md shadow-2xl rounded-2xl p-10 w-full max-w-2xl border border-blue-200">

    <h1 class="text-4xl font-bold text-blue-600 mb-4 text-center"
        th:text="${appName}">App Name</h1>

    <div class="space-y-2 text-gray-700 text-lg">
        <p>
            <span class="font-semibold text-blue-500">Version:</span>
            <span th:text="${version}"></span>
        </p>
        <p>
            <span class="font-semibold text-blue-500">Author:</span>
            <span th:text="${author}"></span>
        </p>
    </div>

    <h3 class="mt-6 text-2xl font-semibold text-blue-600 border-b border-blue-200 pb-2">
        Technologies Used
    </h3>

    <ul class="mt-4 space-y-2">
        <li th:each="tech : ${technologies}"
            th:text="${tech}"
            class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg shadow-sm hover:bg-blue-200 transition duration-300">
            Technology
        </li>
    </ul>

    <div class="text-center mt-8">
        <a th:href="@{/}"
           class="inline-block bg-blue-500 text-white px-6 py-2 rounded-xl shadow-md hover:bg-blue-600 hover:scale-105 transition duration-300">
            Home
        </a>
    </div>

</div>

</body>
</html>
