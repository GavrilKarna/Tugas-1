<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Detail Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-sky-100 via-blue-100 to-cyan-100 min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="flex-grow flex justify-center px-4 py-10">

    <div class="w-full max-w-3xl">

        <!-- Produk ditemukan -->
        <div th:if="${product != null}"
             class="bg-white/70 backdrop-blur-md shadow-2xl rounded-2xl p-8 border border-blue-200">

            <!-- Breadcrumb -->
            <div class="text-sm text-gray-600 mb-6">
                <a th:href="@{/}" class="hover:text-blue-600">Home</a>
                <span class="mx-2">/</span>
                <a th:href="@{/products}" class="hover:text-blue-600">Produk</a>
                <span class="mx-2">/</span>
                <span class="text-blue-600 font-medium"
                      th:text="${product.name}">Nama</span>
            </div>

            <h1 class="text-3xl font-bold text-blue-600 mb-6"
                th:text="${product.name}">
                Nama Produk
            </h1>

            <div class="bg-white rounded-xl shadow-md p-6 border border-blue-100">
                <div class="space-y-4">

                    <div class="flex justify-between border-b pb-2">
                        <span class="font-semibold text-gray-600">ID</span>
                        <span th:text="${product.id}">1</span>
                    </div>

                    <div class="flex justify-between border-b pb-2">
                        <span class="font-semibold text-gray-600">Nama</span>
                        <span th:text="${product.name}">Nama</span>
                    </div>

                    <div class="flex justify-between border-b pb-2">
                        <span class="font-semibold text-gray-600">Kategori</span>
                        <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                           class="text-blue-600 hover:underline"
                           th:text="${product.category}">
                            Kategori
                        </a>
                    </div>

                    <div class="flex justify-between border-b pb-2">
                        <span class="font-semibold text-gray-600">Harga</span>
                        <span class="font-bold text-blue-600"
                              th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                            Rp 0
                        </span>
                    </div>

                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-gray-600">Stok</span>
                        <div>
                            <span th:text="${product.stock}">0</span>

                            <span th:if="${product.stock < 20}"
                                  class="ml-2 px-3 py-1 text-sm rounded-full bg-red-100 text-red-600 font-medium">
                                Stok Menipis!
                            </span>

                            <span th:if="${product.stock >= 20}"
                                  class="ml-2 px-3 py-1 text-sm rounded-full bg-green-100 text-green-600 font-medium">
                                Tersedia
                            </span>
                        </div>
                    </div>

                </div>
            </div>

        </div>

        <!-- Produk tidak ditemukan -->
        <div th:if="${product == null}"
             class="bg-red-100 border border-red-300 text-red-700 p-6 rounded-xl shadow-md">
            <h4 class="text-xl font-bold mb-2">Produk Tidak Ditemukan</h4>
            <p th:text="${error}">Error message</p>
        </div>

        <div class="mt-6">
            <a th:href="@{/products}"
               class="inline-block bg-blue-500 text-white px-6 py-2 rounded-xl shadow-md hover:bg-blue-600 hover:scale-105 transition duration-300">
                Kembali ke Daftar
            </a>
        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
