<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-sky-100 via-blue-100 to-cyan-100 min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="flex-grow flex justify-center px-4 py-10">

    <div class="w-full max-w-6xl bg-white/70 backdrop-blur-md shadow-2xl rounded-2xl p-8 border border-blue-200">

        <h1 class="text-3xl font-bold text-blue-600 mb-6"
            th:text="${title}">
            Judul
        </h1>

        <!-- Search Form -->
        <form th:action="@{/products/search}" method="get" class="mb-6">
            <div class="flex gap-3">
                <input type="text" name="keyword"
                       class="flex-grow px-4 py-2 rounded-xl border border-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Cari produk..."
                       th:value="${keyword}">
                <button type="submit"
                        class="bg-blue-500 text-white px-6 py-2 rounded-xl shadow hover:bg-blue-600 hover:scale-105 transition duration-300">
                    Cari
                </button>
            </div>
        </form>

        <!-- Category Filter -->
        <div class="mb-4 flex flex-wrap items-center gap-3">
            <span class="text-gray-600 font-medium">Filter:</span>

            <a th:href="@{/products}"
               class="px-4 py-1 rounded-full bg-gray-200 text-gray-700 hover:bg-gray-300 transition">
                Semua
            </a>

            <a th:href="@{/products/category/Elektronik}"
               class="px-4 py-1 rounded-full bg-blue-100 text-blue-700 hover:bg-blue-200 transition">
                Elektronik
            </a>

            <a th:href="@{/products/category/Buku}"
               class="px-4 py-1 rounded-full bg-green-100 text-green-700 hover:bg-green-200 transition">
                Buku
            </a>

            <a th:href="@{/products/category/Makanan}"
               class="px-4 py-1 rounded-full bg-yellow-100 text-yellow-700 hover:bg-yellow-200 transition">
                Makanan
            </a>
        </div>

        <p class="text-gray-600 mb-6">
            Menampilkan
            <span class="font-bold text-blue-600" th:text="${totalProducts}">0</span>
            produk
        </p>

        <!-- Tabel Produk -->
        <div th:if="${!products.isEmpty()}" class="overflow-x-auto">

            <table class="min-w-full bg-white rounded-xl overflow-hidden shadow-md">

                <thead class="bg-blue-500 text-white">
                <tr>
                    <th class="px-4 py-3 text-left">No</th>
                    <th class="px-4 py-3 text-left">Nama Produk</th>
                    <th class="px-4 py-3 text-left">Kategori</th>
                    <th class="px-4 py-3 text-left">Harga</th>
                    <th class="px-4 py-3 text-left">Stok</th>
                    <th class="px-4 py-3 text-left">Aksi</th>
                </tr>
                </thead>

                <tbody class="divide-y divide-blue-100">
                <tr th:each="product, iterStat : ${products}"
                    class="hover:bg-blue-50 transition">

                    <td class="px-4 py-3"
                        th:text="${iterStat.count}">1</td>

                    <td class="px-4 py-3 font-medium text-blue-600"
                        th:text="${product.name}">
                        Nama
                    </td>

                    <td class="px-4 py-3">
                        <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                           class="text-blue-500 hover:underline"
                           th:text="${product.category}">
                            Kategori
                        </a>
                    </td>

                    <td class="px-4 py-3"
                        th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                        Rp 0
                    </td>

                    <td class="px-4 py-3">
                        <span th:text="${product.stock}"
                              th:class="${product.stock < 20} ?
                                'px-3 py-1 rounded-full text-sm bg-red-100 text-red-600 font-medium' :
                                'px-3 py-1 rounded-full text-sm bg-green-100 text-green-600 font-medium'">
                            0
                        </span>
                    </td>

                    <td class="px-4 py-3">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="bg-cyan-500 text-white px-4 py-1 rounded-lg shadow hover:bg-cyan-600 hover:scale-105 transition duration-300 text-sm">
                            Detail
                        </a>
                    </td>

                </tr>
                </tbody>

            </table>
        </div>

        <!-- Pesan kosong -->
        <div th:if="${products.isEmpty()}"
             class="mt-6 bg-yellow-100 border border-yellow-300 text-yellow-800 p-4 rounded-xl">
            Tidak ada produk yang ditemukan.
        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
