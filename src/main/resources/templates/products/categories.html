<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-sky-100 to-cyan-100 min-h-screen">

<div class="max-w-3xl mx-auto p-6">

    <h1 class="text-3xl font-bold text-gray-800 mb-6">
        Daftar Kategori
    </h1>

    <ul class="space-y-3">
        <li th:each="category : ${categories}"
            class="bg-white shadow-md hover:shadow-lg transition rounded-xl p-4">

            <a th:href="@{/products/category/{cat}(cat=${category})}"
               th:text="${category}"
               class="text-blue-600 font-medium hover:text-blue-800 hover:underline">
            </a>

        </li>
    </ul>

    <div class="mt-6">
        <a th:href="@{/products}"
           class="inline-block bg-gray-600 text-white px-5 py-2 rounded-lg shadow hover:bg-gray-700 transition">
            Back to Products
        </a>
    </div>

</div>

</body>
</html>
