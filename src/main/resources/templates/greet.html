<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-sky-100 via-blue-100 to-cyan-100 min-h-screen flex items-center justify-center">

<div class="bg-white/70 backdrop-blur-md shadow-2xl rounded-2xl p-10 w-full max-w-2xl border border-blue-200 text-center">

    <h1 class="text-4xl font-bold text-blue-600 mb-6 animate-pulse"
        th:text="${greeting}">
        Greeting
    </h1>

    <a th:href="@{/}"
       class="inline-block bg-blue-500 text-white px-6 py-2 rounded-xl shadow-md hover:bg-blue-600 hover:scale-105 transition duration-300">
        Home
    </a>

</div>

</body>
</html>
